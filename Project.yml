name: MinaAnii
options:
  bundleIdPrefix: com.polao
  deploymentTarget:
    iOS: latest
  createIntermediateGroups: true

packages:
  MobileVLCKit:
    url: https://github.com/showbie/MobileVLCKit-SPM.git
    from: 3.3.17

targets:
  MinaAnii:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: MobileVLCKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.polao.minaanii
        PRODUCT_NAME: MinaAnii
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Mina Anii
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        
        # Enables the app to open files directly from the iOS Files app
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - audio
          
        CFBundleURLTypes:
          - CFBundleURLName: "com.polao.minaanii"
            CFBundleURLSchemes:
              - "minaanii"
              
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Video Files"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "public.movie"
              - "public.video"
              - "public.avi"
              - "org.matroska.mkv"
              - "public.mpeg-4"
              - "com.apple.quicktime-movie"
          - CFBundleTypeName: "Audio Files"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "public.audio"
              - "public.mp3"
              - "public.mpeg-4-audio"
              - "org.xiph.flac"
              - "public.aifc-audio"
              - "com.microsoft.waveform-audio"
          - CFBundleTypeName: "Subtitle Files"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "public.plain-text"
              - "public.text"
              - "public.subrip"
