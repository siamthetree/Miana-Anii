name: Build Mina Anii IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch MobileVLCKit Dependency URL
        run: |
          echo "Swapping bad URLs for the working Showbie mirror..."
          find . -type f \( -name "project.yml" -o -name "Package.swift" \) -exec sed -i '' 's|https://code.videolan.org/videolan/VLCKit.git|https://github.com/showbie/MobileVLCKit-SPM.git|g' {} +
          find . -type f \( -name "project.yml" -o -name "Package.swift" \) -exec sed -i '' 's|https://github.com/mjisagal/MobileVLCKit-SPM.git|https://github.com/showbie/MobileVLCKit-SPM.git|g' {} +
          find . -type f \( -name "project.yml" -o -name "Package.swift" \) -exec sed -i '' 's|https://github.com/yeatse/MobileVLCKit-SPM.git|https://github.com/showbie/MobileVLCKit-SPM.git|g' {} +
          find . -type f \( -name "project.yml" -o -name "Package.swift" \) -exec sed -i '' 's|https://github.com/stefansp/MobileVLCKit-SPM.git|https://github.com/showbie/MobileVLCKit-SPM.git|g' {} +
          echo "Patch complete."

      - name: Generate app icon and asset catalog
        run: |
          mkdir -p Assets.xcassets/AppIcon.appiconset
          cat > Assets.xcassets/AppIcon.appiconset/Contents.json << 'JSON'
          {
            "images" : [
              {
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024",
                "filename" : "AppIcon.png",
                "scale" : "1x"
              }
            ],
            "info" : {
              "version" : 1,
              "author" : "xcode"
            }
          }
          JSON
          python3 -c "import zlib, struct; W=H=1024; open('Assets.xcassets/AppIcon.appiconset/AppIcon.png', 'wb').write(b'\x89PNG\r\n\x1a\n' + struct.pack('>I', 13) + b'IHDR' + struct.pack('>IIBBBBB', W, H, 8, 2, 0, 0, 0) + struct.pack('>I', 0) + b'IDAT' + zlib.compress(b'\x00' * (W * H * 3 + H)) + struct.pack('>I', 0) + b'IEND' + struct.pack('>I', 0))"

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: brew install xcodegen
        
      - name: Inject Secrets.plist
        run: |
          mkdir -p Sources
          cat > Sources/Secrets.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>TraktClientID</key>
              <string>${{ secrets.TRAKT_CLIENT_ID }}</string>
              <key>TraktClientSecret</key>
              <string>${{ secrets.TRAKT_CLIENT_SECRET }}</string>
              <key>TMDBAPIKey</key>
              <string>${{ secrets.TMDB_API_KEY }}</string>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Make project readable by this Xcode
        run: |
          /usr/bin/sed -i '' \
            -e 's/objectVersion = [0-9][0-9]*;/objectVersion = 56;/' \
            -e 's/preferredProjectObjectVersion = [0-9][0-9]*;/preferredProjectObjectVersion = 56;/' \
            MinaAnii.xcodeproj/project.pbxproj

      - name: Build (unsigned, Release)
        run: |
          xcodebuild \
            -project MinaAnii.xcodeproj \
            -scheme MinaAnii \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          APP_PATH=$(find build -type d -name "MinaAnii.app" | head -n 1)
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry MinaAnii.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinaAnii-IPA
          path: MinaAnii.ipa
