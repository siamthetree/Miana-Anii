name: Build Mina Anii IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST" ]; then LATEST=/Applications/Xcode.app; fi
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version
          swift --version
          xcodebuild -showsdks | grep -i ios

      - name: Generate app icon and asset catalog
        run: |
          mkdir -p Sources/Assets.xcassets/AppIcon.appiconset
          cat > Sources/Assets.xcassets/Contents.json << 'JSON1'
          {
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          JSON1
          cat > Sources/Assets.xcassets/AppIcon.appiconset/Contents.json << 'JSON2'
          {
            "images" : [
              {
                "filename" : "AppIcon.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          JSON2
          python3 << 'PYEOF'
          import zlib, struct
          W = H = 1024
          ax, ay = 402, 330
          bx, by = 402, 694
          cx, cy = 718, 512
          top = (124, 58, 237)
          bottom = (46, 16, 101)
          rows = bytearray()
          for y in range(H):
              t = y / (H - 1)
              rr = int(top[0] + (bottom[0] - top[0]) * t)
              gg = int(top[1] + (bottom[1] - top[1]) * t)
              bb = int(top[2] + (bottom[2] - top[2]) * t)
              rows.append(0)
              for x in range(W):
                  d1 = (x - ax) * (by - ay) - (y - ay) * (bx - ax)
                  d2 = (x - bx) * (cy - by) - (y - by) * (cx - bx)
                  d3 = (x - cx) * (ay - cy) - (y - cy) * (ax - cx)
                  has_neg = d1 < 0 or d2 < 0 or d3 < 0
                  has_pos = d1 > 0 or d2 > 0 or d3 > 0
                  if not (has_neg and has_pos):
                      rows += b'\xff\xff\xff'
                  else:
                      rows += bytes((rr, gg, bb))
          def chunk(tag, data):
              return struct.pack('>I', len(data)) + tag + data + struct.pack('>I', zlib.crc32(tag + data) & 0xffffffff)
          ihdr = struct.pack('>IIBBBBB', W, H, 8, 2, 0, 0, 0)
          png = b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', zlib.compress(bytes(rows), 9)) + chunk(b'IEND', b'')
          open('Sources/Assets.xcassets/AppIcon.appiconset/AppIcon.png', 'wb').write(png)
          print('icon written:', len(png), 'bytes')
          PYEOF

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: brew install xcodegen

      - name: Inject Secrets.plist
        run: |
          mkdir -p Sources
          cat > Sources/Secrets.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>TraktClientID</key>
              <string>${{ secrets.TRAKT_CLIENT_ID }}</string>
              <key>TraktClientSecret</key>
              <string>${{ secrets.TRAKT_CLIENT_SECRET }}</string>
              <key>TMDBAPIKey</key>
              <string>${{ secrets.TMDB_API_KEY }}</string>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pin project format
        run: |
          /usr/bin/sed -i '' \
            -e 's/objectVersion = [0-9][0-9]*;/objectVersion = 56;/' \
            -e 's/preferredProjectObjectVersion = [0-9][0-9]*;/preferredProjectObjectVersion = 56;/' \
            MinaAnii.xcodeproj/project.pbxproj
          grep -m1 'objectVersion' MinaAnii.xcodeproj/project.pbxproj

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MinaAnii.xcodeproj \
            -scheme MinaAnii

      - name: Build (Unsigned, Release)
        run: |
          xcodebuild build \
            -project MinaAnii.xcodeproj \
            -scheme MinaAnii \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find build -type d -name "MinaAnii.app" | head -n 1)
          echo "Found app at: $APP_PATH"
          test -n "$APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry MinaAnii.ipa Payload
          ls -la MinaAnii.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinaAnii-IPA
          path: MinaAnii.ipa
